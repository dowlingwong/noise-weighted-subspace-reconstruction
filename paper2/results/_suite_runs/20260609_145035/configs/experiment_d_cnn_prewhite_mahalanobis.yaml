experiment:
  name: experiment_d_cnn_prewhite_mahalanobis_l40s_run02
  seed: 314159
data:
  trace_path: data/k_alpha/k_alpha_traces.h5
  rq_path: data/k_alpha/k_alpha_rqs.h5
  trace_len: 32768
  n_channels: 1
  batch_size: 16
  pretrigger: 4000
  baseline_correct: true
  max_events: 2048
  num_workers: 4
  pin_memory: true
  train_fraction: 0.7
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 314159
preprocessing:
  input_mode: prewhitened
  psd_path: data/Noise_PSD/noise_psd_from_MMC.npy
loss:
  mode: mahalanobis
model:
  family: cnn_ae
  latent_dim: 128
  hidden_channels:
  - 16
  - 32
  - 64
  kernel_size: 7
  stride: 2
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
training:
  epochs: 40
  grad_clip: 1.0
  early_stop_patience: 8
evaluation:
  metrics:
  - weighted_residual
  - reconstruction_mse
  - amplitude_rmse
  - timing_rmse
