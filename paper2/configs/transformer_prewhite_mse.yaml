experiment:
  name: transformer_prewhite_mse
  seed: 314159

data:
  trace_path: data/k_alpha_traces.h5
  rq_path: data/k_alpha_rqs.h5
  trace_len: 32768
  n_channels: 1
  batch_size: 8
  pretrigger: 4000
  baseline_correct: true
  max_events: 2048
  num_workers: 0
  pin_memory: false
  train_fraction: 0.70
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 314159

preprocessing:
  input_mode: prewhitened
  psd_path: data/weight/noise_psd_pink.npy

loss:
  mode: mse

model:
  family: transformer
  latent_dim: 128
  patch_len: 128
  patch_stride: 128
  d_model: 128
  d_ff: 512
  n_head: 4
  n_temporal_blocks: 4
  dropout: 0.10

optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4

training:
  epochs: 80
  grad_clip: 1.0
  early_stop_patience: 10

evaluation:
  metrics: [weighted_residual, reconstruction_mse, amplitude_rmse, timing_rmse]
