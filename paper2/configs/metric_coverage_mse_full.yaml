experiment:
  name: metric_coverage_mse_full
  seed: 314159

data:
  trace_path: data/k_alpha/k_alpha_traces.h5
  rq_path: data/k_alpha/k_alpha_rqs.h5
  trace_len: 32768
  n_channels: 1
  batch_size: 16
  pretrigger: 4000
  baseline_correct: true
  max_events: 2048
  num_workers: 0
  pin_memory: false
  train_fraction: 0.70
  val_fraction: 0.15
  test_fraction: 0.15
  seed: 314159
  coverage_mode: full
  coverage_fields: [amplitude, t0]
  coverage_quantile_low: 0.20
  coverage_quantile_high: 0.80

preprocessing:
  input_mode: raw
  psd_path: data/Noise_PSD/noise_psd_from_MMC.npy

loss:
  mode: mse

model:
  family: ae
  latent_dim: 256
  hidden_channels: [32, 64, 128]
  kernel_size: 7
  stride: 2

optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4

training:
  epochs: 40
  grad_clip: 1.0
  early_stop_patience: 8

evaluation:
  metrics: [weighted_residual, reconstruction_mse, amplitude_rmse, timing_rmse]
